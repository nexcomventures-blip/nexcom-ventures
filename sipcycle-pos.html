<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SipCycle POS</title>
    <style>
        :root {
            --cyan: #00BDD6;
            --navy: #003B73;
            --dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: env(safe-area-inset-top) 20px 20px 20px;
            background: var(--dark);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Logo & Header */
        .header { margin: 20px 0; }
        .logo-icon { width: 60px; height: 60px; }
        .brand-name { font-size: 28px; font-weight: 800; color: var(--cyan); margin: 0; }
        .tagline { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; }

        /* Status Area */
        .status-pill {
            display: inline-block;
            background: rgba(0, 189, 214, 0.1);
            color: var(--cyan);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 189, 214, 0.2);
        }

        /* Main Card */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Camera / Scanner */
        #v { width: 100%; border-radius: 16px; background: #000; border: 2px solid var(--cyan); display: none; margin-bottom: 15px; }
        .scanner-btn {
            background: var(--cyan);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        /* Customer Panel */
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .cust-name { font-size: 24px; font-weight: 700; margin: 0; }
        .cust-balance { font-size: 42px; font-weight: 800; color: var(--cyan); margin: 10px 0; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 25px; }
        .pay-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            cursor: pointer;
        }
        .pay-btn b { display: block; font-size: 18px; color: var(--cyan); }
        .pay-btn span { font-size: 12px; opacity: 0.7; }
        .pay-btn:active { background: var(--cyan); color: #000; }
        .pay-btn:active b { color: #000; }

        /* Secondary Buttons */
        .btn-sec {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
            font-weight: 600;
        }

        /* Logs */
        .logs-title { text-align: left; font-size: 14px; opacity: 0.5; margin: 10px 0; font-weight: 600; }
        .log-item {
            background: rgba(255,255,255,0.03);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .log-amt { color: var(--cyan); font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }
        input:focus { border-color: var(--cyan); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5C35 5 15 25 15 50C15 69.33 30.67 85 50 85C69.33 85 85 69.33 85 50" stroke="#00BDD6" stroke-width="10" stroke-linecap="round"/>
                <path d="M50 5C65 5 85 25 85 50" stroke="#00BDD6" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 2"/>
                <path d="M75 50L85 60L95 50" stroke="#00BDD6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1 class="brand-name">SipCycle</h1>
            <div class="tagline">POS TERMINAL</div>
        </div>

        <div id="status" class="status-pill">⚡ STANDALONE MODE ACTIVE</div>

        <div class="card">
            <!-- Home Panel -->
            <div id="home-panel">
                <video id="v" playsinline></video>
                <button onclick="startScan()" class="scanner-btn" id="scan-btn">
                    <span>📷 SCAN MEMBER CARD</span>
                </button>
                <div style="margin-top: 15px; font-size: 12px; opacity: 0.5;">
                    Point camera at QR code or tap NFC card
                </div>
            </div>

            <!-- Customer Panel -->
            <div id="customer-panel" class="panel">
                <p style="opacity: 0.5; margin: 0; font-size: 12px; text-transform: uppercase;">Customer Active</p>
                <h2 class="cust-name" id="display-name">---</h2>
                <div class="cust-balance" id="display-balance">KSh 0</div>
                
                <div class="action-grid">
                    <button class="pay-btn" onclick="deduct(50, 5)"><b>5L</b><span>50/-</span></button>
                    <button class="pay-btn" onclick="deduct(100, 10)"><b>10L</b><span>100/-</span></button>
                    <button class="pay-btn" onclick="deduct(150, 20)"><b>20L</b><span>150/-</span></button>
                </div>
                
                <button onclick="goHome()" class="btn-sec">DONE / NEXT CLIENT</button>
            </div>

            <!-- Register Panel -->
            <div id="register-panel" class="panel">
                <h3 style="margin-top:0">Register New Card</h3>
                <p id="new-card-id" style="color:var(--cyan); font-family:monospace"></p>
                <input id="reg-name" type="text" placeholder="Full Name">
                <input id="reg-phone" type="tel" placeholder="Phone Number">
                <input id="reg-amt" type="number" placeholder="Initial Balance (KSh)">
                <button onclick="register()" class="scanner-btn">ACTIVATE CARD</button>
                <button onclick="goHome()" class="btn-sec">CANCEL</button>
            </div>
        </div>

        <div class="logs-title">RECENT ACTIVITY</div>
        <div id="logs">
            <div style="padding:20px; opacity:0.3; font-size:12px">No transactions yet.</div>
        </div>
        
        <button onclick="clearAllData()" style="margin-top:40px; background:none; border:none; color:red; opacity:0.3; font-size:10px">RESET SYSTEM</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let video = document.getElementById('v');
        let scanBtn = document.getElementById('scan-btn');
        let canvas = document.createElement('canvas');
        let ctx = canvas.getContext('2d');
        let scanning = false;
        let activeCardId = null;

        // --- Database Logic (LocalStorage) ---
        function getDB() { return JSON.parse(localStorage.getItem('sipcycle_db') || '{}'); }
        function saveDB(db) { localStorage.setItem('sipcycle_db', JSON.stringify(db)); }
        function getLogs() { return JSON.parse(localStorage.getItem('sipcycle_logs') || '[]'); }
        function addLog(msg, amt) {
            let logs = getLogs();
            logs.unshift({ time: new Date().toLocaleTimeString(), msg, amt });
            localStorage.setItem('sipcycle_logs', JSON.stringify(logs.slice(0, 10)));
            renderLogs();
        }

        // --- UI Logic ---
        function goHome() {
            stopScan();
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('home-panel').classList.remove('hidden');
            document.getElementById('customer-panel').style.display = 'none';
            document.getElementById('register-panel').style.display = 'none';
            document.getElementById('home-panel').style.display = 'block';
            activeCardId = null;
        }

        function showCustomer(id, data) {
            activeCardId = id;
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-balance').innerText = 'KSh ' + data.balance;
            document.getElementById('home-panel').style.display = 'none';
            document.getElementById('customer-panel').style.display = 'block';
        }

        function showRegister(id) {
            activeCardId = id;
            document.getElementById('new-card-id').innerText = 'ID: ' + id;
            document.getElementById('home-panel').style.display = 'none';
            document.getElementById('register-panel').style.display = 'block';
        }

        // --- Core Actions ---
        function lookup(id) {
            const db = getDB();
            if (db[id]) {
                showCustomer(id, db[id]);
            } else {
                showRegister(id);
            }
        }

        function deduct(amt, ltr) {
            const db = getDB();
            if (db[activeCardId].balance < amt) {
                alert('❌ INSUFFICIENT BALANCE\nCurrent: KSh ' + db[activeCardId].balance);
                return;
            }
            db[activeCardId].balance -= amt;
            saveDB(db);
            addLog(db[activeCardId].name + ' - Refill', amt);
            alert('✅ SUCCESS: ' + ltr + 'L Refill\nNew Balance: KSh ' + db[activeCardId].balance);
            goHome();
        }

        function register() {
            const name = document.getElementById('reg-name').value;
            const amt = parseFloat(document.getElementById('reg-amt').value || 0);
            if (!name) return alert('Enter Name');
            
            const db = getDB();
            db[activeCardId] = { name, phone: document.getElementById('reg-phone').value, balance: amt };
            saveDB(db);
            addLog(name + ' - Registered', amt);
            goHome();
        }

        function renderLogs() {
            const logs = getLogs();
            const container = document.getElementById('logs');
            if (logs.length === 0) return;
            container.innerHTML = logs.map(l => `
                <div class="log-item">
                    <div><b>${l.time}</b><br><span style="opacity:0.6">${l.msg}</span></div>
                    <div class="log-amt">${l.amt > 0 ? '-' : ''}KSh ${l.amt}</div>
                </div>
            `).join('');
        }

        // --- Scanner Logic ---
        function startScan() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
                scanning = true;
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                video.style.display = 'block';
                scanBtn.style.display = 'none';
                requestAnimationFrame(tick);
            });
        }

        function stopScan() {
            scanning = false;
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            video.style.display = 'none';
            scanBtn.style.display = 'flex';
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                let code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) {
                    stopScan();
                    lookup(code.data);
                    return;
                }
            }
            if (scanning) requestAnimationFrame(tick);
        }

        // --- NFC Logic (Android) ---
        if ('NDEFReader' in window) {
            const ndef = new NDEFReader();
            ndef.scan().then(() => {
                document.getElementById('status').innerText = '⚡ NFC & SCANNER READY';
                ndef.onreading = event => {
                    lookup(event.serialNumber);
                };
            }).catch(e => console.log(e));
        }

        function clearAllData() {
            if (confirm("Reset everything?")) {
                localStorage.clear();
                location.reload();
            }
        }

        renderLogs();
    </script>
</body>
</html>
