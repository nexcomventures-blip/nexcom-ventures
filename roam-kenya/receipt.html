<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Expedition Receipt | Roam Kenya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --secondary: #1b3022; /* Jungle Green */
            --accent: #c29d59; /* Safari Gold */
            --text-main: #ffffff;
            --receipt-bg: #fff;
            --receipt-text: #000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f4f4f4;
            font-family: 'Courier New', Courier, monospace;
            color: var(--receipt-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .ticket-container {
            width: 100%;
            max-width: 380px;
            background: var(--receipt-bg);
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            border-top: 5px solid var(--primary);
        }
        .ticket-container::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(-45deg, var(--receipt-bg) 5px, transparent 0), 
                        linear-gradient(45deg, var(--receipt-bg) 5px, transparent 0);
            background-size: 10px 10px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .divider {
            border-top: 1px dashed #ccc;
            margin: 15px 0;
        }
        .main-info {
            font-size: 13px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .label {
            text-transform: uppercase;
            font-weight: bold;
            font-size: 11px;
        }
        .value {
            text-align: right;
        }
        .barcode {
            text-align: center;
            margin: 20px 0;
        }
        .barcode img {
            width: 100%;
            max-width: 200px;
            height: auto;
            filter: grayscale(1);
        }
        .status-badge {
            text-align: center;
            border: 2px solid #000;
            padding: 5px;
            font-weight: bold;
            margin: 10px 0;
            display: block;
        }
        .footer-note {
            text-align: center;
            font-size: 11px;
            margin-top: 20px;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            width: 100%;
            max-width: 380px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #000;
            background: #fff;
            color: #000;
            font-family: sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: #000; color: #fff; }
        
        @media print {
            .actions { display: none !important; }
            body { background: none; padding: 0; }
            .ticket-container { box-shadow: none; border: none; margin: 0 auto; }
            @page {
                size: auto;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="ticket-container" id="printableTicket">
            <div class="header">
                <div class="logo">ROAM KENYA</div>
                <div class="subtitle">Official Expedition Receipt</div>
                <div class="divider"></div>
            </div>

            <div class="main-info">
                <div class="info-row">
                    <span class="label">Receipt No:</span>
                    <span class="value" id="receiptNo"></span>
                </div>
                <div class="info-row">
                    <span class="label">Date:</span>
                    <span class="value" id="currentDate"></span>
                </div>
                <div class="info-row">
                    <span class="label">Client:</span>
                    <span class="value" id="userName">Valued Guest</span>
                </div>
                <div class="divider"></div>
                
                <div class="info-row">
                    <span class="label">Expedition:</span>
                    <span class="value">Bespoke Safari</span>
                </div>
                <div class="info-row">
                    <span class="label">Status:</span>
                    <span class="value">PAID</span>
                </div>
                <div class="status-badge">PAYMENT VERIFIED</div>
                
                <div class="divider"></div>
                <div class="barcode">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Barcode-39.svg/800px-Barcode-39.svg.png" alt="Barcode">
                    <p style="font-size: 10px; margin-top: 5px;" id="barcodeText"></p>
                </div>
            </div>

            <div class="footer-note">
                THANK YOU FOR CHOOSING ROAM KENYA<br>
                Mama Ngina St, Nairobi<br>
                www.nexcomventures.co.ke
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> Save PDF</button>
            <a href="index.html" class="btn"><i class="fas fa-home"></i> Back Home</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // Generate random details
        document.getElementById('receiptNo').innerText = 'RK-' + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('barcodeText').innerText = '*' + Date.now() + '*';

        // Set current date
        const d = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('currentDate').innerText = d.toLocaleDateString('en-US', options);

        // Get user name from URL
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('name')) {
            document.getElementById('userName').innerText = urlParams.get('name');
        }

        function saveAsPDF() {
            const element = document.getElementById('printableTicket');
            const opt = {
                margin: [10, 10],
                filename: 'Roam_Kenya_Receipt.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: [80, 200], orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
