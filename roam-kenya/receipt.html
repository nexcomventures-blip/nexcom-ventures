<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedition Receipt | Roam Kenya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b3022; /* Jungle Green */
            --accent: #c29d59; /* Safari Gold */
            --bg-site: #ffffff;
            --text-dark: #1b3022;
            --receipt-width: 58mm; /* Standard handheld POS width */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-site);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            min-height: 100vh;
            color: var(--text-dark);
        }
        /* Handheld POS Optimized Receipt */
        .receipt-strip {
            width: var(--receipt-width);
            background: #fff;
            color: #000;
            padding: 15px 8px;
            border: 1px solid #eee;
            position: relative;
            font-size: 11px;
            line-height: 1.3;
        }
        /* Color strip to match website theme */
        .receipt-strip::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: bold;
        }
        .divider {
            border-top: 1px dashed #bbb;
            margin: 8px 0;
        }
        .bold { font-weight: 700; }
        .flex {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .label { text-transform: uppercase; font-size: 9px; color: #666; }
        .status-box {
            border: 1px solid var(--primary);
            text-align: center;
            padding: 4px;
            margin: 10px 0;
            font-weight: 700;
            font-size: 11px;
            background: #f0f4f1;
            color: var(--primary);
        }
        .barcode-section {
            text-align: center;
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* CSS Barcode fallback to prevent broken images */
        .barcode-svg {
            width: 100%;
            height: 35px;
        }
        .footer {
            text-align: center;
            font-size: 8px;
            margin-top: 10px;
            color: #666;
        }
        /* Action Buttons with Brand Colors */
        .actions {
            margin-top: 20px;
            width: var(--receipt-width);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-pdf {
            background: var(--primary);
            color: #fff;
        }
        .btn-home {
            background: #f4f4f4;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn:active { transform: scale(0.98); }

        @media print {
            body { background: white; padding: 0; }
            .actions { display: none !important; }
            .receipt-strip { border: none; padding: 0; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="receipt-strip" id="receipt">
        <div class="header">
            <div class="logo">ROAM KENYA</div>
            <div class="subtitle">Boutique Safari Curators</div>
            <div class="divider"></div>
        </div>

        <div class="content">
            <div class="flex">
                <span class="label">Receipt No:</span>
                <span class="bold" id="receiptNo"></span>
            </div>
            <div class="flex">
                <span class="label">Date:</span>
                <span id="currentDate"></span>
            </div>
            <div class="flex">
                <span class="label">Client:</span>
                <span class="bold" id="userName">Valued Guest</span>
            </div>
            <div class="flex">
                <span class="label">Reference:</span>
                <span class="bold" id="payRef">---</span>
            </div>
            
            <div class="divider"></div>
            
            <div class="flex">
                <span class="label">Service:</span>
                <span class="bold">Bespoke Expedition</span>
            </div>
            <div class="flex">
                <span class="label">Method:</span>
                <span id="payMethod">M-PESA</span>
            </div>
            
            <div class="status-box">PAYMENT VERIFIED</div>
            
            <div class="divider"></div>
            
            <div class="barcode-section">
                <svg id="barcode" class="barcode-svg"></svg>
                <div style="font-size: 7px; margin-top: 2px;" id="barcodeText"></div>
            </div>
        </div>

        <div class="footer">
            THANK YOU FOR ROAMING WITH US<br>
            Nairobi, Kenya<br>
            www.nexcomventures.co.ke
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-pdf" onclick="saveAsPDF()">
            <i class="fas fa-file-pdf"></i> SAVE AS PDF
        </button>
        <a href="index.html" class="btn btn-home">
            <i class="fas fa-home"></i> BACK HOME
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // Generate values
        const rNo = 'RK-' + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('receiptNo').innerText = rNo;
        
        const timestamp = Date.now().toString().slice(-10);
        document.getElementById('barcodeText').innerText = timestamp;

        // Generate barcode using JsBarcode to ensure it's not broken
        JsBarcode("#barcode", timestamp, {
            format: "CODE128",
            lineColor: "#000",
            width: 2,
            height: 40,
            displayValue: false
        });

        const d = new Date();
        document.getElementById('currentDate').innerText = d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('name')) document.getElementById('userName').innerText = urlParams.get('name');
        if(urlParams.has('method')) document.getElementById('payMethod').innerText = urlParams.get('method');
        if(urlParams.has('ref')) document.getElementById('payRef').innerText = urlParams.get('ref');

        function saveAsPDF() {
            const element = document.getElementById('receipt');
            const opt = {
                margin: [2, 0, 2, 0],
                filename: 'Roam_Kenya_Receipt.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: [58, 140], orientation: 'portrait' },
                pagebreak: { mode: 'avoid-all' }
            }
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
