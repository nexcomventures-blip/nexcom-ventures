<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexcom Ventures | Premium Laptops Nairobi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #800000; /* Maroon */
            --primary-dark: #660000;
            --gradient: linear-gradient(135deg, #800000, #660000);
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gold: #FFD700;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; line-height: 1.6; background: #fff; color: var(--dark); }

        /* Header */
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            border-top: 4px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: -1px; }

        /* Hero */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1496181133206-80ce9b88a853?auto=format&fit=crop&q=80&w=1600') center/cover;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 0 10%;
        }
        .hero h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; letter-spacing: -2px; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.8; font-weight: 300; }

        /* Catalog */
        .container { padding: 4rem 5%; }
        .search-box {
            max-width: 600px;
            margin: -2rem auto 3rem;
            position: relative;
            z-index: 10;
        }
        .search-box input {
            width: 100%;
            padding: 1.2rem 2rem;
            border-radius: 50px;
            border: none;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { box-shadow: 0 15px 45px rgba(128,0,0,0.15); border: 1px solid var(--primary); }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: var(--radius);
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); border-color: var(--primary); }

        .product-img {
            width: 100%;
            height: 240px;
            background: #fdfdfd;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }
        .product-img img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
        .product-card:hover .product-img img { transform: scale(1.08); }

        .product-info { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
        .product-brand { font-size: 0.75rem; text-transform: uppercase; color: var(--primary); font-weight: 800; letter-spacing: 1px; }
        .product-name { font-size: 1.1rem; margin: 0.4rem 0; font-weight: 800; color: var(--dark); line-height: 1.2; }
        .product-specs { font-size: 0.85rem; color: #777; margin-bottom: 1.5rem; line-height: 1.4; }
        
        .product-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f5f5f5; padding-top: 1.2rem; margin-top: auto; }
        .product-price { font-size: 1.2rem; font-weight: 900; color: var(--primary); font-family: 'Space Grotesk', sans-serif; }
        .buy-btn {
            background: var(--gradient);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 800;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(128,0,0,0.2);
        }
        .buy-btn:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(128,0,0,0.3); }

        /* Footer */
        footer { background: var(--dark); color: #fff; padding: 4rem 5%; text-align: center; }
        .whatsapp-fixed {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #25D366;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .container { padding: 2rem 5%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexcom Ventures</div>
        <nav>
            <a href="https://wa.me/254721585784" style="text-decoration:none; color:var(--primary); font-weight:700;">Contact Us</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Nairobi's Best Laptop Deals</h1>
        <p>Premium Laptops & MacBooks at Unbeatable Prices</p>
    </section>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search laptops (e.g. '840 G8', 'M1', '16GB')..." onkeyup="handleSearch()">
        </div>

        <div class="filters" id="brand-filters">
            <button class="filter-btn active" onclick="filterBrand('All')">All Brands</button>
            <button class="filter-btn" onclick="filterBrand('HP')">HP</button>
            <button class="filter-btn" onclick="filterBrand('Apple')">MacBook</button>
            <button class="filter-btn" onclick="filterBrand('Dell')">Dell</button>
            <button class="filter-btn" onclick="filterBrand('Lenovo')">Lenovo</button>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Loading... -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nexcom Ventures Ltd. Mama Ngina St, Nairobi.</p>
    </footer>

    <a href="https://wa.me/254721585784" class="whatsapp-fixed">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        let allProducts = [];

        async function loadProducts() {
            try {
                const response = await fetch('inventory.json');
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (error) {
                console.error('Error loading inventory:', error);
                document.getElementById('product-grid').innerHTML = '<p>Error loading products. Please check inventory.json</p>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-img">
                        <img src="${p.image}" alt="${p.model}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Photo'">
                    </div>
                    <div class="product-info">
                        <div class="product-brand">${p.brand} | ${p.condition}</div>
                        <h3 class="product-name">${p.model}</h3>
                        <p class="product-specs">${p.specs}</p>
                        <div class="product-footer">
                            <span class="product-price">KSh ${p.price}</span>
                            <a href="https://wa.me/254721585784?text=Hi, I am interested in the ${p.model}" class="buy-btn">Order</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.model.toLowerCase().includes(query) || 
                p.brand.toLowerCase().includes(query) || 
                p.specs.toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        function filterBrand(brand) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(brand)) btn.classList.add('active');
            });

            if (brand === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.brand === brand);
                renderProducts(filtered);
            }
        }

        loadProducts();
    </script>
</body>
</html>
