<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- White Background -->
  <rect width="400" height="400" fill="white"/>
  
  <g transform="translate(200, 200)">
    <!-- Scale the entire group for a nice fit -->
    <g transform="scale(3.2) translate(-50, -45)">
      <!-- Wave Logo on top -->
      <path d="M10,40 Q30,5 50,25 T90,10" fill="none" stroke="#800000" stroke-width="12" stroke-linecap="round"/>
      
      <!-- Text nexcom. below -->
      <text x="50" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" letter-spacing="-2" fill="#212529">nexcom<tspan fill="#800000">.</tspan></text>
    </g>
  </g>
</svg>