<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- White Background -->
  <rect width="400" height="400" fill="white"/>
  
  <g transform="translate(200, 200)">
    <g transform="scale(3.0) translate(-50, -50)">
      <!-- Wave Logo on top -->
      <path d="M10,35 Q30,0 50,20 T90,5" fill="none" stroke="#800000" stroke-width="12" stroke-linecap="round"/>
      
      <!-- Main Text: nexcom. -->
      <text x="50" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" letter-spacing="-2" fill="#212529">nexcom<tspan fill="#800000">.</tspan></text>
      
      <!-- Subtitle: VENTURES LTD -->
      <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="8" letter-spacing="4" fill="#6c757d" text-transform="uppercase">VENTURES LTD</text>
    </g>
  </g>
</svg>